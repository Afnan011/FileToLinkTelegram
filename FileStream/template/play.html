<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{file_name}} — FileStream</title>
    <meta name="description" content="Watch {{file_name}} online — FileStream">
    <link rel="icon" href="https://i.ibb.co/Hh4kF2b/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #232323;
            --accent: #e50914; --accent2: #f40612;
            --text: #fff; --text2: #b3b3b3; --text3: #6e6e6e;
            --border: #2a2a2a; --border2: #383838;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* NAV */
        .nav {
            position: sticky; top: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 32px;
            background: linear-gradient(180deg, rgba(15,15,15,.97) 0%, rgba(15,15,15,.5) 80%, transparent 100%);
            backdrop-filter: blur(6px);
        }
        .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 13px; height: 13px; }
        .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .logo-text em { color: var(--accent); font-style: normal; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
            border-radius: 6px; font-size: 13px; font-weight: 500; text-decoration: none;
            cursor: pointer; border: none; font-family: 'Inter', sans-serif; transition: all .18s;
        }
        .nav-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
        .nav-btn.ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
        .nav-btn.ghost:hover { color: var(--text); border-color: #555; background: rgba(255,255,255,.05); }
        .nav-btn.tg { background: #229ED9; color: #fff; }
        .nav-btn.tg:hover { background: #1a8abf; }

        /* PLAYER */
        .player-wrap { background: #000; width: 100%; }
        .plyr {
            --plyr-color-main: var(--accent);
            --plyr-font-family: 'Inter', sans-serif;
            --plyr-video-controls-background: linear-gradient(transparent, rgba(0,0,0,0.88));
            --plyr-range-track-height: 4px;
            border-radius: 0;
        }
        .plyr video { width: 100%; max-height: 75vh; object-fit: contain; }

        /* INFO SECTION */
        .info { max-width: 1100px; margin: 0 auto; padding: 24px 32px 12px; }
        .file-title { font-size: 20px; font-weight: 600; line-height: 1.35; margin-bottom: 10px; word-break: break-word; }
        .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px;
            border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
        }
        .badge.video { background: rgba(229,9,20,.14); color: #ff5561; border: 1px solid rgba(229,9,20,.3); }
        .badge.size  { background: rgba(255,255,255,.06); color: var(--text2); border: 1px solid var(--border2); }
        .badge.qual  { background: rgba(255,255,255,.1); color: #fff; border: 1px solid rgba(255,255,255,.25); }

        /* TRACKS PANELS */
        .tracks-block {
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 12px; padding: 16px 20px; margin-bottom: 14px;
            animation: fadeUp .25s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .tracks-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text3); margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .tracks-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .track-pill {
            padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border2);
            background: transparent; color: var(--text2); font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif;
        }
        .track-pill:hover { border-color: #666; color: var(--text); }
        .track-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .track-pill:disabled { opacity: .4; cursor: not-allowed; }
        .track-loading { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
        .spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SWITCHING OVERLAY */
        .switching-msg {
            display: none; align-items: center; gap: 8px;
            font-size: 12px; color: var(--accent); margin-top: 10px;
        }
        .switching-msg.show { display: flex; }

        /* DIVIDER */
        .divider { height: 1px; background: var(--border); margin: 20px 0; }

        /* ACTIONS */
        .actions-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 12px; }
        .actions-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .action-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px;
            border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3);
            color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer;
            text-decoration: none; font-family: 'Inter', sans-serif; transition: all .18s; white-space: nowrap;
        }
        .action-btn:hover { background: var(--bg2); border-color: #555; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .action-btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
        .action-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(70px);
            background: rgba(20,20,20,.96); color: #fff; padding: 11px 22px;
            border-radius: 8px; font-size: 13px; font-weight: 500;
            border: 1px solid var(--border2); backdrop-filter: blur(10px);
            z-index: 999; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
            opacity: 0; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        footer { text-align: center; padding: 28px; color: var(--text3); font-size: 12px; border-top: 1px solid var(--border); margin-top: 48px; }
        footer a { color: var(--text3); text-decoration: none; }
        footer a:hover { color: var(--text2); }

        @media (max-width: 768px) {
            .nav { padding: 12px 16px; }
            .info { padding: 16px 16px 10px; }
            .file-title { font-size: 15px; }
            .action-btn { padding: 9px 14px; font-size: 12px; }
            .nav-btn.ghost { display: none; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="/" class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>
        <span class="logo-text">File<em>Stream</em></span>
    </a>
    <div class="nav-right">
        <a href="/files" class="nav-btn ghost">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            Library
        </a>
        <a href="https://t.me/FilmyPixel" class="nav-btn tg" target="_blank">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-2.05 9.656c-.148.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.913.565z"/></svg>
            <span>Telegram</span>
        </a>
    </div>
</nav>

<!-- PLAYER -->
<div class="player-wrap">
    <video id="player" playsinline crossorigin="anonymous">
        <source src="{{file_url}}" type="video/mp4">
    </video>
</div>

<!-- INFO -->
<div class="info">
    <h1 class="file-title">{{file_name}}</h1>
    <div class="meta-row" id="metaRow">
        <span class="badge video">VIDEO</span>
        <span class="badge size">{{file_size}}</span>
        <span class="badge qual" id="qualBadge" style="display:none">HD</span>
    </div>

    <!-- AUDIO TRACKS -->
    <div class="tracks-block" id="audioBlock">
        <div class="tracks-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            Audio Tracks
        </div>
        <div class="tracks-row" id="audioRow">
            <span class="track-loading"><span class="spinner"></span>Detecting tracks…</span>
        </div>
        <div class="switching-msg" id="audioSwitching">
            <span class="spinner"></span> Switching audio — reloading from current position…
        </div>
    </div>

    <!-- SUBTITLE TRACKS -->
    <div class="tracks-block" id="subBlock" style="display:none">
        <div class="tracks-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Subtitles
        </div>
        <div class="tracks-row" id="subRow"></div>
        <div class="switching-msg" id="subSwitching">
            <span class="spinner"></span> Loading subtitle…
        </div>
    </div>

    <div class="divider"></div>

    <div class="actions-label">Open with</div>
    <div class="actions-row">
        <a class="action-btn primary" href="{{file_url}}" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
        </a>
        <button class="action-btn" onclick="copyLink()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Copy Link
        </button>
        <button class="action-btn" onclick="openVLC()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            VLC (Full MKV support)
        </button>
        <button class="action-btn" onclick="openMX()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
            MX Player
        </button>
        <button class="action-btn" onclick="openNPlayer()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="4"/><polygon points="9 8 17 12 9 16 9 8"/></svg>
            nPlayer
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<footer>
    <p>Powered by <a href="https://github.com/Afnan011">FileStream</a> &nbsp;·&nbsp; © 2024 Muhammad Afnan</p>
</footer>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    const FILE_URL  = "{{file_url}}";
    const FILE_NAME = "{{file_name}}";
    const FILE_ID   = "{{file_id}}";

    // ── Init Plyr ────────────────────────────────────────────
    const player = new Plyr('#player', {
        controls: ['play-large','play','rewind','fast-forward','progress','current-time','duration','mute','volume','captions','settings','pip','airplay','fullscreen'],
        settings: ['captions','quality','speed'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
        keyboard: { focused: true, global: true },
        tooltips: { controls: true, seek: true },
        captions: { active: false, language: 'auto', update: true },
        fullscreen: { enabled: true, fallback: true, iosNative: true },
        storage: { enabled: true, key: 'plyr_prefs' },
    });
    const vid = document.querySelector('#player');

    // Quality badge
    vid.addEventListener('loadedmetadata', () => {
        if (vid.videoHeight >= 720) {
            const qb = document.getElementById('qualBadge');
            qb.style.display = 'inline-flex';
            qb.textContent = vid.videoHeight >= 2160 ? '4K' : vid.videoHeight >= 1080 ? 'FHD' : 'HD';
        }
    });

    // ── Load tracks from server (ffprobe) ────────────────────
    let tracksData = { audio: [], subtitles: [] };
    let currentAudioIdx  = 0;
    let currentSubIdx    = -1;  // -1 = off
    let isUsingRemux     = false;

    async function loadTracks() {
        try {
            const res  = await fetch(`/api/tracks/${FILE_ID}`);
            const data = await res.json();
            tracksData = data;
            renderAudioTracks(data.audio   || []);
            renderSubtitleTracks(data.subtitles || []);
        } catch (e) {
            document.getElementById('audioRow').innerHTML =
                '<span style="font-size:12px;color:var(--text3)">Could not detect tracks</span>';
        }
    }

    // ── AUDIO ────────────────────────────────────────────────
    function renderAudioTracks(tracks) {
        const row   = document.getElementById('audioRow');
        if (tracks.length === 0) {
            row.innerHTML = '<span style="font-size:12px;color:var(--text3)">Single audio track (no switching needed)</span>';
            return;
        }
        row.innerHTML = '';
        // "Original" pill = use direct /dl/ stream (no remux)
        tracks.forEach((t, i) => {
            const btn = document.createElement('button');
            btn.className = 'track-pill' + (i === 0 ? ' active' : '');
            btn.textContent = t.label + (t.codec ? ` (${t.codec.toUpperCase()})` : '');
            btn.title = [t.language && `Language: ${t.language}`, t.channels && `Channels: ${t.channels}`].filter(Boolean).join(' · ');
            btn.addEventListener('click', () => switchAudio(i, btn));
            row.appendChild(btn);
        });
    }

    async function switchAudio(trackIdx, clickedBtn) {
        if (trackIdx === currentAudioIdx && isUsingRemux) return;
        const savedTime   = vid.currentTime;
        const wasPaused   = player.paused;

        currentAudioIdx = trackIdx;
        isUsingRemux    = true;

        // UI feedback
        document.querySelectorAll('#audioRow .track-pill').forEach(b => b.classList.remove('active'));
        clickedBtn.classList.add('active');
        document.querySelectorAll('#audioRow .track-pill').forEach(b => b.disabled = true);
        document.getElementById('audioSwitching').classList.add('show');

        // Switch source to /remux/?audio=N
        const remuxUrl = `/remux/${FILE_ID}?audio=${trackIdx}`;
        vid.src = remuxUrl;
        vid.load();

        toast(`🎵 Switching to: ${clickedBtn.textContent.split(' (')[0]}…`);

        vid.addEventListener('canplay', function onCanPlay() {
            vid.removeEventListener('canplay', onCanPlay);
            // Seek back to saved position
            if (savedTime > 0) {
                vid.currentTime = savedTime;
            }
            if (!wasPaused) {
                vid.play().catch(() => {});
            }
            document.getElementById('audioSwitching').classList.remove('show');
            document.querySelectorAll('#audioRow .track-pill').forEach(b => b.disabled = false);
            toast(`✅ Audio switched`);
        });
    }

    // ── SUBTITLES ────────────────────────────────────────────
    function renderSubtitleTracks(tracks) {
        if (tracks.length === 0) return;

        document.getElementById('subBlock').style.display = 'block';
        const row = document.getElementById('subRow');
        row.innerHTML = '';

        // Off button
        const offBtn = document.createElement('button');
        offBtn.className = 'track-pill active';
        offBtn.textContent = 'Off';
        offBtn.addEventListener('click', () => {
            disableAllSubs();
            setSubActive(offBtn);
            toast('Subtitles off');
        });
        row.appendChild(offBtn);

        tracks.forEach((t, i) => {
            const btn = document.createElement('button');
            btn.className = 'track-pill';
            btn.textContent = t.label;
            btn.title = t.language ? `Language: ${t.language}` : '';
            btn.addEventListener('click', () => switchSubtitle(i, btn));
            row.appendChild(btn);
        });
    }

    async function switchSubtitle(trackIdx, clickedBtn) {
        const subUrl = `/sub/${FILE_ID}/${trackIdx}.vtt`;
        document.getElementById('subSwitching').classList.add('show');
        toast(`💬 Loading subtitle…`);

        try {
            // Remove any previously injected tracks
            vid.querySelectorAll('track.injected').forEach(t => t.remove());

            // Disable all existing text tracks
            disableAllSubs();

            // Add new track element
            const track       = document.createElement('track');
            track.kind        = 'subtitles';
            track.src         = subUrl;
            track.srclang     = tracksData.subtitles[trackIdx]?.language || 'und';
            track.label       = tracksData.subtitles[trackIdx]?.label    || `Sub ${trackIdx}`;
            track.className   = 'injected';
            track.default     = true;
            vid.appendChild(track);

            // Force enable after it loads
            track.addEventListener('load', () => {
                track.track.mode = 'showing';
                // Also tell Plyr
                try { player.currentTrack = 0; } catch(e) {}
                document.getElementById('subSwitching').classList.remove('show');
                setSubActive(clickedBtn);
                toast(`✅ Subtitles: ${track.label}`);
            });

            track.addEventListener('error', () => {
                document.getElementById('subSwitching').classList.remove('show');
                toast('⚠️ Could not load subtitle. Try another or use VLC.');
            });

        } catch(e) {
            document.getElementById('subSwitching').classList.remove('show');
            toast('⚠️ Subtitle load failed');
        }
    }

    function disableAllSubs() {
        const textTracks = vid.textTracks;
        for (let i = 0; i < textTracks.length; i++) {
            textTracks[i].mode = 'hidden';
        }
    }

    function setSubActive(activeBtn) {
        document.querySelectorAll('#subRow .track-pill').forEach(b => b.classList.remove('active'));
        activeBtn.classList.add('active');
    }

    // ── Toast ────────────────────────────────────────────────
    let toastTimer;
    function toast(msg) {
        clearTimeout(toastTimer);
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── Actions ──────────────────────────────────────────────
    function copyLink() {
        const url = window.location.href;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(() => toast('✅ Link copied!'));
        } else {
            const inp = document.createElement('input');
            inp.value = url; document.body.appendChild(inp);
            inp.select(); document.execCommand('copy');
            document.body.removeChild(inp);
            toast('✅ Link copied!');
        }
    }
    function openVLC()     { window.location.href = `vlc://${FILE_URL}`; setTimeout(() => toast('Opening VLC…'), 400); }
    function openMX()      { window.location.href = `intent:${FILE_URL}#Intent;package=com.mxtech.videoplayer.ad;end`; setTimeout(() => toast('Opening MX Player…'), 400); }
    function openNPlayer() { window.location.href = `nplayer-${FILE_URL}`; setTimeout(() => toast('Opening nPlayer…'), 400); }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
        if (e.key === 'f' || e.key === 'F') player.fullscreen.toggle();
        if (e.key === 'm' || e.key === 'M') player.toggleMute();
    });

    // Kickoff track detection
    loadTracks();
</script>
</body>
</html>
