<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{file_name}} — FileStream</title>
    <link rel="icon" href="https://i.ibb.co/Hh4kF2b/icon.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
{% raw %}
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --red:#e50914; --red2:#f40612;
    --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#262626;
    --text:#fff; --text2:#b3b3b3; --text3:#6e6e6e;
    --border:#333; --border2:#444;
}
html,body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; line-height:1; }

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;
     background:rgba(15,15,15,.96);border-bottom:1px solid var(--border);position:relative;z-index:300;}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-icon{width:28px;height:28px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:17px;font-weight:700;}
.logo-text em{color:var(--red);font-style:normal;}
.nav-btns{display:flex;gap:8px;}
.nav-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:6px;
         font-size:13px;font-weight:500;text-decoration:none;border:1px solid var(--border2);
         background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s;}
.nav-btn:hover{color:var(--text);border-color:#666;background:rgba(255,255,255,.05);}
.nav-btn svg{width:14px;height:14px;flex-shrink:0;}

/* ── PLAYER ─────────────────────────────────────────────────── */
.player-outer{
    position:relative;
    background:#000;
    width:100%;
    /* NO fixed height — video element sets height via height:auto */
    line-height:0; /* kills phantom space below inline video */
    overflow:hidden;
}
/* The video sizes itself naturally. height:auto = keeps aspect ratio. */
.player-outer video{
    display:block;
    width:100%;
    height:auto;               /* ← key fix: no black gap */
    max-height:calc(100vh - 56px); /* don't go taller than viewport */
    object-fit:contain;
    background:#000;
}

/* ── SUBTITLE OVERLAY ── */
.sub-overlay{
    position:absolute;
    bottom:70px;left:0;right:0;
    display:flex;justify-content:center;align-items:flex-end;
    pointer-events:none;z-index:15;padding:0 5%;
    transition:bottom .2s;
}
.player-outer.ctrl-hidden .sub-overlay{bottom:14px;}
.sub-text{
    font-size:clamp(14px,2.2vw,22px);font-weight:600;color:#fff;
    text-align:center;line-height:1.45;padding:5px 16px;
    border-radius:4px;background:rgba(0,0,0,.62);
    text-shadow:0 1px 4px rgba(0,0,0,.8);max-width:88%;word-break:break-word;
    min-height:1px;
}

/* ── CENTRE RIPPLE ── */
.ripple{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:60px;height:60px;border-radius:50%;
    background:rgba(255,255,255,.17);display:flex;align-items:center;justify-content:center;
    z-index:5;pointer-events:none;opacity:0;transition:transform .1s,opacity .25s;
}
.ripple.pop{transform:translate(-50%,-50%) scale(1);opacity:1;}
.ripple svg{width:26px;height:26px;}

/* ── GRADIENT ── */
.ctrl-gradient{
    position:absolute;left:0;right:0;bottom:0;height:120px;
    background:linear-gradient(transparent,rgba(0,0,0,.88));
    pointer-events:none;z-index:8;transition:opacity .3s;
}
.player-outer.ctrl-hidden .ctrl-gradient{opacity:0;}

/* ── CONTROLS BAR ── */
.ctrl-bar{
    position:absolute;left:0;right:0;bottom:0;
    padding:0 14px 12px;z-index:20;
    transition:opacity .25s,transform .25s;
}
.player-outer.ctrl-hidden .ctrl-bar{opacity:0;pointer-events:none;transform:translateY(4px);}

/* SEEK */
.seek-row{position:relative;margin-bottom:8px;}
.seek-wrap{
    position:relative;width:100%;height:4px;cursor:pointer;
}
.seek-wrap::before{content:'';position:absolute;top:-10px;bottom:-10px;left:0;right:0;} /* bigger hit area */
.seek-bg{position:absolute;inset:0;background:rgba(255,255,255,.2);border-radius:2px;}
.seek-buf{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.35);border-radius:2px;width:0;}
.seek-fill{position:absolute;top:0;left:0;height:100%;background:var(--red);border-radius:2px;width:0;pointer-events:none;}
.seek-thumb{
    position:absolute;top:50%;left:0;
    width:13px;height:13px;border-radius:50%;background:#fff;
    transform:translate(-50%,-50%);opacity:0;pointer-events:none;
    transition:opacity .12s,transform .12s;
}
.seek-wrap:hover .seek-thumb,.player-outer.seeking .seek-thumb{opacity:1;transform:translate(-50%,-50%) scale(1.2);}
.seek-tooltip{
    position:absolute;bottom:78px;
    background:rgba(18,18,18,.92);border:1px solid var(--border);
    border-radius:4px;padding:3px 8px;font-size:11px;font-weight:500;
    pointer-events:none;white-space:nowrap;z-index:30;
    opacity:0;transform:translateX(-50%);transition:opacity .1s;
}

/* BUTTONS ROW */
.btn-row{display:flex;align-items:center;justify-content:space-between;gap:4px;min-height:36px;}
.btn-L,.btn-R{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.btn-R{gap:3px;}

/* control button */
.cbtn{
    background:transparent;border:none;color:rgba(255,255,255,.82);
    cursor:pointer;padding:6px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    transition:color .15s,background .15s;flex-shrink:0;user-select:none;
}
.cbtn:hover{color:#fff;background:rgba(255,255,255,.12);}
.cbtn svg{width:20px;height:20px;display:block;}
.cbtn.sm svg{width:17px;height:17px;}

/* volume */
.vol-group{display:flex;align-items:center;gap:1px;}
.vol-slider{
    -webkit-appearance:none;appearance:none;
    width:70px;height:4px;border-radius:2px;cursor:pointer;outline:none;border:none;
    background:linear-gradient(to right,#fff 0%,#fff var(--v,100%),rgba(255,255,255,.3) var(--v,100%),rgba(255,255,255,.3) 100%);
}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:grab;}
.vol-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;cursor:grab;border:none;}
@media(max-width:600px){.vol-slider{display:none;}}

.time-disp{font-size:12px;color:rgba(255,255,255,.8);white-space:nowrap;padding:0 5px;line-height:1;}
@media(max-width:400px){.time-total{display:none;}}

/* ── POPUP WRAP ── */
.popup-wrap{position:relative;}
.pill-btn{
    display:flex;align-items:center;gap:5px;
    padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;
    border:1px solid rgba(255,255,255,.25)!important;font-family:inherit;
    line-height:1;
}
.pill-btn svg{width:13px;height:13px;}
.pill-btn .chev{width:10px;height:10px;transition:transform .15s;}
.pill-btn.open .chev{transform:rotate(180deg);}
.pill-btn.has-tracks{border-color:rgba(229,9,20,.6)!important;color:#ff7278;}
@media(max-width:600px){.pill-btn .pill-lbl{display:none;}}

.popup{
    position:absolute;bottom:calc(100% + 10px);right:0;
    background:rgba(20,20,20,.98);border:1px solid var(--border2);
    border-radius:10px;min-width:195px;z-index:200;
    backdrop-filter:blur(14px);box-shadow:0 8px 32px rgba(0,0,0,.7);
    display:none;overflow:hidden;animation:popUp .18s ease;
}
@keyframes popUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.popup.open{display:block;}
.popup-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
            color:var(--text3);padding:10px 14px 6px;border-bottom:1px solid var(--border);}
.popup-item{
    display:flex;align-items:center;gap:9px;width:100%;
    padding:9px 14px;font-size:13px;font-weight:400;
    background:transparent;border:none;color:var(--text2);
    cursor:pointer;text-align:left;font-family:inherit;transition:background .12s,color .12s;
}
.popup-item:hover{background:rgba(255,255,255,.07);color:var(--text);}
.popup-item.active{color:var(--text);font-weight:600;}
.popup-item .ck{width:15px;height:15px;flex-shrink:0;color:var(--red);}
.popup-item .ck.off{visibility:hidden;}
.popup-msg{padding:10px 14px;color:var(--text3);font-size:12px;}
.popup-loading{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;color:var(--text3);}
.spin{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg)}}

/* hide pip on mobile */
@media(max-width:500px){#pipBtn{display:none;}}
/* hide speed on very small */
@media(max-width:380px){#speedWrap{display:none;}}

/* ── INFO AREA ── */
.info{max-width:1080px;margin:0 auto;padding:20px 24px 48px;}
.file-title{font-size:17px;font-weight:600;margin-bottom:10px;word-break:break-word;line-height:1.4;}
.meta-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
.mp{padding:4px 11px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.mp.type{background:rgba(229,9,20,.15);color:#ff5561;border:1px solid rgba(229,9,20,.3);}
.mp.size{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border);}
.actions{display:flex;flex-wrap:wrap;gap:8px;}
.act-btn{
    display:inline-flex;align-items:center;gap:7px;padding:9px 16px;
    border-radius:7px;border:1px solid var(--border2);background:var(--bg3);
    color:var(--text);font-size:13px;font-weight:500;cursor:pointer;
    text-decoration:none;font-family:inherit;transition:all .15s;white-space:nowrap;
}
.act-btn:hover{background:var(--bg2);border-color:#666;transform:translateY(-1px);}
.act-btn.red{background:var(--red);border-color:var(--red);}
.act-btn.red:hover{background:var(--red2);border-color:var(--red2);}
.act-btn svg{width:15px;height:15px;flex-shrink:0;}

/* TOAST */
.toast{
    position:fixed;bottom:22px;left:50%;
    transform:translateX(-50%) translateY(60px);
    background:rgba(18,18,18,.96);color:#fff;padding:10px 20px;
    border-radius:8px;font-size:13px;font-weight:500;
    border:1px solid var(--border2);backdrop-filter:blur(10px);
    z-index:9000;transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .28s;
    opacity:0;pointer-events:none;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    </style>
{% endraw %}
</head>
<body>

<nav class="nav">
    <a href="/" class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>
        <span class="logo-text">File<em>Stream</em></span>
    </a>
    <div class="nav-btns">
        <a href="/files" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            Library
        </a>
    </div>
</nav>

<!-- ═══ PLAYER ═══ -->
<div class="player-outer" id="PO">
    <video id="vid" crossorigin="anonymous" preload="metadata">
        <source src="{{file_url}}">
    </video>

    <!-- Subtitle overlay (always on top of video) -->
    <div class="sub-overlay"><div class="sub-text" id="subTxt"></div></div>

    <!-- Center play/pause ripple -->
    <div class="ripple" id="ripple"><svg id="ripSvg" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>

    <div class="ctrl-gradient"></div>

    <!-- ── CONTROLS ── -->
    <div class="ctrl-bar" id="ctrlBar">

        <!-- SEEK BAR -->
        <div class="seek-row">
            <div class="seek-wrap" id="seekWrap">
                <div class="seek-bg"></div>
                <div class="seek-buf" id="sBuf"></div>
                <div class="seek-fill" id="sFill"></div>
                <div class="seek-thumb" id="sThumb"></div>
            </div>
            <div class="seek-tooltip" id="sTip"></div>
        </div>

        <!-- BUTTON ROW -->
        <div class="btn-row">
            <!-- LEFT -->
            <div class="btn-L">
                <!-- Play/Pause -->
                <button class="cbtn" id="playBtn" onclick="togglePlay()" title="Play/Pause (Space)">
                    <svg id="playIco" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
                <!-- −10s -->
                <button class="cbtn sm" onclick="skip(-10)" title="−10s (←)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.54"/></svg>
                </button>
                <!-- +10s -->
                <button class="cbtn sm" onclick="skip(10)" title="+10s (→)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.54"/></svg>
                </button>
                <!-- Volume -->
                <div class="vol-group">
                    <button class="cbtn" id="muteBtn" onclick="toggleMute()" title="Mute (M)">
                        <svg id="volIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
                        </svg>
                    </button>
                    <input class="vol-slider" id="volBar" type="range" min="0" max="1" step="0.02" value="1">
                </div>
                <!-- Time -->
                <span class="time-disp" id="tDisp"><span id="tCur">0:00</span><span class="time-total"> / --:--</span></span>
            </div>

            <!-- RIGHT -->
            <div class="btn-R">
                <!-- AUDIO -->
                <div class="popup-wrap" id="audioWrap">
                    <button class="cbtn pill-btn" id="audioBtn" onclick="togglePopup('audioPop','audioBtn')" title="Audio Track">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                        <span class="pill-lbl">Audio</span>
                        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="popup" id="audioPop">
                        <div class="popup-head">Audio Track</div>
                        <div id="audioList"><div class="popup-loading"><span class="spin"></span>Detecting…</div></div>
                    </div>
                </div>

                <!-- SUBTITLES -->
                <div class="popup-wrap" id="subWrap">
                    <button class="cbtn pill-btn" id="subBtn" onclick="togglePopup('subPop','subBtn')" title="Subtitles">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" ry="2"/><path d="M7 15h3m4 0h3M7 11h10"/></svg>
                        <span class="pill-lbl">Subs</span>
                        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="popup" id="subPop">
                        <div class="popup-head">Subtitles</div>
                        <div id="subList"><div class="popup-loading"><span class="spin"></span>Detecting…</div></div>
                    </div>
                </div>

                <!-- SPEED -->
                <div class="popup-wrap" id="speedWrap">
                    <button class="cbtn pill-btn" id="speedBtn" onclick="togglePopup('speedPop','speedBtn')" title="Speed">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        <span class="pill-lbl" id="speedLbl">1×</span>
                        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="popup" id="speedPop">
                        <div class="popup-head">Speed</div>
                        <div id="speedList"></div>
                    </div>
                </div>

                <!-- PiP -->
                <button class="cbtn sm" id="pipBtn" onclick="togglePip()" title="Picture in Picture">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><rect x="12" y="13" width="8" height="6" rx="1"/></svg>
                </button>

                <!-- Fullscreen -->
                <button class="cbtn" id="fsBtn" onclick="toggleFS()" title="Fullscreen (F)">
                    <svg id="fsIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ═══ INFO ═══ -->
<div class="info">
    <h1 class="file-title">{{file_name}}</h1>
    <div class="meta-pills">
        <span class="mp type">VIDEO</span>
        <span class="mp size">{{file_size}}</span>
    </div>
    <div class="actions">
        <a class="act-btn red" href="{{file_url}}" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
        </a>
        <button class="act-btn" onclick="copyLink()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            Copy Link
        </button>
        <button class="act-btn" onclick="window.location.href='vlc://{{file_url}}'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Open in VLC
        </button>
        <button class="act-btn" onclick="window.location.href='intent:{{file_url}}#Intent;package=com.mxtech.videoplayer.ad;end'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
            MX Player
        </button>
    </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
/* Jinja2 variables — must stay outside raw block */
const FILE_URL = "{{file_url}}";
const FILE_ID  = "{{file_id}}";
</script>
{% raw %}
<script>

/* ────────────── DOM ────────────── */
const PO       = document.getElementById('PO');
const vid      = document.getElementById('vid');
const playIco  = document.getElementById('playIco');
const volIco   = document.getElementById('volIco');
const volBar   = document.getElementById('volBar');
const tCur     = document.getElementById('tCur');
const tDisp    = document.getElementById('tDisp');
const sFill    = document.getElementById('sFill');
const sBuf     = document.getElementById('sBuf');
const sThumb   = document.getElementById('sThumb');
const seekWrap = document.getElementById('seekWrap');
const sTip     = document.getElementById('sTip');
const subTxt   = document.getElementById('subTxt');
const ripple   = document.getElementById('ripple');
const ripSvg   = document.getElementById('ripSvg');
const fsIco    = document.getElementById('fsIco');
const speedLbl = document.getElementById('speedLbl');

/* ────────────── PLAY / PAUSE ────────────── */
function togglePlay(){
    if(vid.paused){ vid.play(); blink(true); }
    else           { vid.pause(); blink(false); }
}
PO.addEventListener('click', e=>{
    if(e.target.closest('.ctrl-bar')||e.target.closest('.popup')) return;
    togglePlay();
});
PO.addEventListener('dblclick', e=>{
    if(e.target.closest('.ctrl-bar')||e.target.closest('.popup')) return;
    toggleFS();
});
vid.addEventListener('play',  ()=>setIcon(true));
vid.addEventListener('pause', ()=>setIcon(false));
vid.addEventListener('ended', ()=>setIcon(false));

function setIcon(p){
    playIco.innerHTML = p
        ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
        : '<polygon points="5,3 19,12 5,21"/>';
}
function blink(p){
    ripSvg.innerHTML = p
        ? '<polygon points="5,3 19,12 5,21"/>'
        : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    ripple.classList.add('pop');
    setTimeout(()=>ripple.classList.remove('pop'),300);
}

/* ────────────── SEEK ────────────── */
let seeking=false, seekPct=0;

function pct(){ return vid.duration? vid.currentTime/vid.duration : 0; }
function applyPct(p){
    const pp=Math.min(1,Math.max(0,p));
    sFill.style.width  = (pp*100)+'%';
    sThumb.style.left  = (pp*100)+'%';
}
vid.addEventListener('timeupdate',()=>{ if(!seeking){ applyPct(pct()); updateTimeDsp(); subOverlay(); } });
vid.addEventListener('progress',()=>{
    if(!vid.duration||!vid.buffered.length) return;
    sBuf.style.width = (vid.buffered.end(vid.buffered.length-1)/vid.duration*100)+'%';
});

/* Mouse seek */
seekWrap.addEventListener('mousedown', e=>{ seeking=true; PO.classList.add('seeking'); doSeek(e); });
document.addEventListener('mousemove', e=>{ if(seeking) doSeek(e); });
document.addEventListener('mouseup',   ()=>{ if(seeking){ seeking=false; PO.classList.remove('seeking'); } });
/* Touch seek */
seekWrap.addEventListener('touchstart', e=>{ seeking=true; doSeekT(e); },{passive:true});
document.addEventListener('touchmove',  e=>{ if(seeking) doSeekT(e); },{passive:true});
document.addEventListener('touchend',   ()=>{ seeking=false; });

function doSeek(e){
    const r=seekWrap.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    vid.currentTime = p*(vid.duration||0);
    applyPct(p);
    showTip(e.clientX-r.left, r.width, p);
}
function doSeekT(e){
    const t=e.touches[0], r=seekWrap.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(t.clientX-r.left)/r.width));
    vid.currentTime = p*(vid.duration||0);
    applyPct(p);
}
seekWrap.addEventListener('mousemove', e=>{
    if(!seeking){ const r=seekWrap.getBoundingClientRect(); const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); showTip(e.clientX-r.left,r.width,p); }
});
seekWrap.addEventListener('mouseleave', ()=>{ if(!seeking) sTip.style.opacity='0'; });
function showTip(x,w,p){
    sTip.textContent = fmt(p*(vid.duration||0));
    sTip.style.left  = Math.min(Math.max(x,24),w-24)+'px';
    sTip.style.opacity='1';
}

/* ────────────── VOLUME ────────────── */
volBar.addEventListener('input',()=>{
    vid.volume=parseFloat(volBar.value); vid.muted=(vid.volume===0);
    volBar.style.setProperty('--v',(volBar.value*100)+'%');
    updVol();
});
function toggleMute(){
    vid.muted=!vid.muted;
    if(!vid.muted&&vid.volume===0) vid.volume=0.5;
    volBar.value=vid.muted?0:vid.volume;
    volBar.style.setProperty('--v',(volBar.value*100)+'%');
    updVol();
}
function updVol(){
    const m=vid.muted||vid.volume===0;
    volIco.innerHTML=m
        ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/><line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>'
        : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}

/* ────────────── FULLSCREEN ────────────── */
function toggleFS(){
    if(!document.fullscreenElement) PO.requestFullscreen?.()??PO.webkitRequestFullscreen?.();
    else document.exitFullscreen?.()??document.webkitExitFullscreen?.();
}
document.addEventListener('fullscreenchange',()=>{
    const fs=!!document.fullscreenElement;
    fsIco.innerHTML=fs
        ? '<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>'
        : '<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
});

/* ────────────── PiP ────────────── */
function togglePip(){
    if(document.pictureInPictureElement) document.exitPictureInPicture?.();
    else vid.requestPictureInPicture?.().catch(()=>toast('PiP not supported'));
}

/* ────────────── SPEED ────────────── */
[0.25,0.5,0.75,1,1.25,1.5,1.75,2].forEach(s=>{
    const b=document.createElement('button');
    b.className='popup-item'+(s===1?' active':'');
    b.id='sp'+s;
    b.innerHTML=`<svg class="ck${s!==1?' off':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>${s===1?'Normal (1×)':s+'×'}`;
    b.onclick=()=>{
        vid.playbackRate=s;
        speedLbl.textContent=s===1?'1×':s+'×';
        document.querySelectorAll('#speedList .popup-item').forEach(x=>x.classList.remove('active'));
        document.querySelectorAll('#speedList .ck').forEach(x=>x.classList.add('off'));
        b.classList.add('active'); b.querySelector('.ck').classList.remove('off');
        closeAll();
    };
    document.getElementById('speedList').appendChild(b);
});

/* ────────────── SKIP ────────────── */
function skip(s){ vid.currentTime=Math.max(0,Math.min(vid.duration||0,vid.currentTime+s)); }

/* ────────────── CONTROLS AUTO-HIDE ────────────── */
let hideT;
function showCtrl(){
    PO.classList.remove('ctrl-hidden');
    clearTimeout(hideT);
    if(!vid.paused) hideT=setTimeout(()=>PO.classList.add('ctrl-hidden'),2800);
}
PO.addEventListener('mousemove', showCtrl);
PO.addEventListener('touchstart', showCtrl,{passive:true});
vid.addEventListener('play', ()=>{ hideT=setTimeout(()=>PO.classList.add('ctrl-hidden'),2800); });
vid.addEventListener('pause',()=>{ clearTimeout(hideT); PO.classList.remove('ctrl-hidden'); });

/* ────────────── POPUPS ────────────── */
function togglePopup(popId,btnId){
    const pop=document.getElementById(popId), btn=document.getElementById(btnId);
    const was=pop.classList.contains('open');
    closeAll();
    if(!was){ pop.classList.add('open'); btn?.classList.add('open'); }
}
function closeAll(){
    document.querySelectorAll('.popup').forEach(p=>p.classList.remove('open'));
    document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('open'));
}
document.addEventListener('click',e=>{ if(!e.target.closest('.popup-wrap')) closeAll(); });

/* ────────────── KEYBOARD ────────────── */
document.addEventListener('keydown',e=>{
    if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    if(e.code==='Space'){ e.preventDefault(); togglePlay(); }
    if(e.code==='ArrowLeft')  skip(-10);
    if(e.code==='ArrowRight') skip(10);
    if(e.code==='ArrowUp'){ e.preventDefault(); vid.volume=Math.min(1,vid.volume+.1); volBar.value=vid.volume; volBar.style.setProperty('--v',(vid.volume*100)+'%'); updVol(); }
    if(e.code==='ArrowDown'){ e.preventDefault(); vid.volume=Math.max(0,vid.volume-.1); volBar.value=vid.volume; volBar.style.setProperty('--v',(vid.volume*100)+'%'); updVol(); }
    if(e.code==='KeyM') toggleMute();
    if(e.code==='KeyF') toggleFS();
    if(e.code==='Escape') closeAll();
});

/* ────────────── UTIL ────────────── */
function fmt(s){
    if(isNaN(s)||s<0) return '0:00';
    const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60);
    return h>0 ? `${h}:${pad(m)}:${pad(sc)}` : `${m}:${pad(sc)}`;
}
function pad(n){ return String(n).padStart(2,'0'); }
function updateTimeDsp(){
    tCur.textContent=fmt(vid.currentTime);
    const tot=PO.querySelector('.time-total');
    if(tot&&vid.duration) tot.textContent=' / '+fmt(vid.duration);
}
function copyLink(){
    (navigator.clipboard?.writeText(location.href)||Promise.reject())
        .then(()=>toast('✅ Link copied!'))
        .catch(()=>{ const i=document.createElement('input');i.value=location.href;document.body.appendChild(i);i.select();document.execCommand('copy');document.body.removeChild(i);toast('✅ Link copied!'); });
}
let toastT;
function toast(msg,dur=3000){
    clearTimeout(toastT);
    const el=document.getElementById('toastEl');
    el.textContent=msg;el.classList.add('show');
    toastT=setTimeout(()=>el.classList.remove('show'),dur);
}

/* ══════════════════════════════════════════════════════════════
   TRACK DETECTION — dual strategy:
   1. Native browser audioTracks / textTracks  (Chrome/Edge/Safari)
   2. Server ffprobe API fallback
══════════════════════════════════════════════════════════════ */

let audioMode  = null;  // 'native' | 'remux'
let subMode    = null;  // 'native' | 'fetch'
let subCues    = null;  // parsed VTT cues (fetch mode)
let activeCueTrack = null; // native TextTrack being listened to
let curAudio   = 0;
let curSub     = -1;

/* Start API probe immediately (parallel) */
const apiPromise = fetch(`/api/tracks/${FILE_ID}`)
    .then(r=>r.ok?r.json():null)
    .catch(()=>null);

/* Poll native audioTracks until we get tracks or give up */
async function pollNativeAudio(maxMs=3000, interval=250){
    const deadline = Date.now() + maxMs;
    while(Date.now() < deadline){
        const tracks = Array.from(vid.audioTracks||[]);
        if(tracks.length > 1) return tracks;
        await new Promise(r=>setTimeout(r, interval));
    }
    return Array.from(vid.audioTracks||[]);
}

async function initTracks(){
    /* Wait for metadata */
    if(vid.readyState < 1)
        await new Promise(r=>vid.addEventListener('loadedmetadata',r,{once:true}));

    /* Run native poll + API fetch in parallel */
    const [nativeAudio, apiData] = await Promise.all([
        pollNativeAudio(3000, 300),
        apiPromise,
    ]);

    /* ── AUDIO ── */
    if(nativeAudio.length > 1){
        audioMode='native';
        buildAudioUI(nativeAudio.map((t,i)=>({
            index:i,
            label:t.label||(t.language&&langName(t.language))||`Audio ${i+1}`,
            language:t.language,
            codec:'',
        })));
    } else if(apiData && apiData.audio && apiData.audio.length > 1){
        audioMode='remux';
        buildAudioUI(apiData.audio);
    } else {
        document.getElementById('audioList').innerHTML=
            '<div class="popup-msg">Single audio track</div>';
    }

    /* ── SUBTITLES ── */
    const nativeSubs = Array.from(vid.textTracks||[])
        .filter(t=>t.kind==='subtitles'||t.kind==='captions');
    nativeSubs.forEach(t=>{ t.mode='hidden'; });

    if(nativeSubs.length > 0){
        subMode='native';
        buildSubUI([{index:-1,label:'Off',type:'native'},
            ...nativeSubs.map((t,i)=>({index:i,label:t.label||(t.language&&langName(t.language))||`Sub ${i+1}`,type:'native'}))
        ]);
    } else if(apiData && apiData.subtitles && apiData.subtitles.length > 0){
        subMode='fetch';
        buildSubUI([{index:-1,label:'Off',type:'fetch'},
            ...apiData.subtitles.map((s,i)=>({...s,index:i,type:'fetch'}))
        ]);
    } else {
        document.getElementById('subList').innerHTML=
            '<div class="popup-msg">No subtitle tracks found</div>';
    }
}

/* ── Language code → readable name ── */
function langName(code){
    const m={hin:'Hindi',eng:'English',tam:'Tamil',tel:'Telugu',kan:'Kannada',
             mal:'Malayalam',mar:'Marathi',ben:'Bengali',pun:'Punjabi',
             ara:'Arabic',fra:'French',deu:'German',spa:'Spanish',zho:'Chinese',
             jpn:'Japanese',kor:'Korean',rus:'Russian',por:'Portuguese',ita:'Italian',
             und:'Undefined'};
    return m[code?.toLowerCase()]||code;
}

/* ── BUILD AUDIO UI ── */
function buildAudioUI(tracks){
    const list=document.getElementById('audioList');
    list.innerHTML=tracks.map((t,i)=>`
        <button class="popup-item${i===0?' active':''}" id="aud_${i}" onclick="switchAudio(${t.index})">
            <svg class="ck${i!==0?' off':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            ${escH(t.label)}${t.codec?`<small style="opacity:.5;font-size:10px;margin-left:5px">${t.codec.toUpperCase()}</small>`:''}
        </button>`).join('');
    if(tracks.length>1) document.getElementById('audioBtn').classList.add('has-tracks');
}

/* ── BUILD SUB UI ── */
function buildSubUI(tracks){
    const list=document.getElementById('subList');
    list.innerHTML=tracks.map((t,i)=>`
        <button class="popup-item${t.index===-1?' active':''}" id="sub_${t.index}" onclick="switchSub(${t.index})">
            <svg class="ck${t.index!==-1?' off':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            ${escH(t.label)}
        </button>`).join('');
    if(tracks.length>1) document.getElementById('subBtn').classList.add('has-tracks');
}

/* ── AUDIO SWITCH ── */
function switchAudio(idx){
    closeAll();
    /* update checkmarks */
    document.querySelectorAll('#audioList .popup-item').forEach((b,i)=>{
        b.classList.toggle('active',i===idx);
        b.querySelector('.ck')?.classList.toggle('off',i!==idx);
    });
    const lbl=document.querySelector(`#aud_${idx}`)?.textContent?.trim().split('\n')[0]?.trim()||'Track '+(idx+1);

    if(audioMode==='native'){
        /* instant, no reload */
        const tracks=vid.audioTracks;
        for(let i=0;i<tracks.length;i++) tracks[i].enabled=(i===idx);
        curAudio=idx;
        toast(`🎵 ${lbl}`);
    } else {
        /* remux — reload with specific audio */
        const saved=vid.currentTime, paused=vid.paused;
        curAudio=idx;
        vid.src=`/remux/${FILE_ID}?audio=${idx}`;
        vid.load();
        vid.addEventListener('canplay',function onC(){
            vid.removeEventListener('canplay',onC);
            vid.currentTime=saved;
            if(!paused) vid.play().catch(()=>{});
            toast(`🎵 ${lbl}`);
        },{once:true});
        toast('Switching audio…');
    }
}

/* ── SUBTITLE SWITCH ── */
async function switchSub(idx){
    closeAll();
    /* update checkmarks */
    document.querySelectorAll('#subList .popup-item').forEach(b=>{
        const match=b.id===`sub_${idx}`;
        b.classList.toggle('active',match);
        b.querySelector('.ck')?.classList.toggle('off',!match);
    });

    if(idx===-1){
        /* OFF */
        if(activeCueTrack){ activeCueTrack.removeEventListener('cuechange',onCue); activeCueTrack=null; }
        subCues=null; curSub=-1; subTxt.innerHTML='';
        toast('Subtitles off');
        return;
    }
    curSub=idx;

    if(subMode==='native'){
        /* Detach old */
        if(activeCueTrack){ activeCueTrack.removeEventListener('cuechange',onCue); activeCueTrack=null; }
        const nativeSubs=Array.from(vid.textTracks||[]).filter(t=>t.kind==='subtitles'||t.kind==='captions');
        const track=nativeSubs[idx];
        if(!track){ toast('⚠️ Sub track not found'); return; }
        /* Hide ALL, then listen to chosen */
        nativeSubs.forEach(t=>{ t.mode='hidden'; t.removeEventListener('cuechange',onCue); });
        activeCueTrack=track;
        track.addEventListener('cuechange',onCue);
        /* mode hidden = browser doesn't render it, but cuechange still fires */
        const lbl=track.label||(track.language&&langName(track.language))||`Sub ${idx+1}`;
        toast(`💬 ${lbl}`);
    } else {
        /* fetch VTT from server */
        toast('💬 Loading subtitle…');
        try{
            const r=await fetch(`/sub/${FILE_ID}/${idx}.vtt`);
            if(!r.ok) throw new Error('bad response');
            const txt=await r.text();
            subCues=parseVTT(txt);
            toast(`✅ Subtitles loaded`);
        } catch(e){
            subCues=null;
            toast('⚠️ Subtitle load failed');
        }
    }
}

function onCue(){
    if(!activeCueTrack){ subTxt.innerHTML=''; return; }
    const cues=activeCueTrack.activeCues;
    subTxt.innerHTML = cues&&cues.length
        ? Array.from(cues).map(c=>c.text.replace(/<[^>]+>/g,'').replace(/\n/g,'<br>')).join('<br>')
        : '';
}

/* ── SUBTITLE OVERLAY (fetch mode) ── */
function subOverlay(){
    if(!subCues||subMode!=='fetch'){ return; }
    const t=vid.currentTime;
    const c=subCues.find(x=>t>=x.s&&t<=x.e);
    subTxt.innerHTML = c ? c.t.replace(/\n/g,'<br>') : '';
}

/* ── VTT PARSER ── */
function parseVTT(raw){
    const cues=[];
    const blocks=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split(/\n{2,}/);
    for(const blk of blocks){
        const lines=blk.trim().split('\n');
        const ai=lines.findIndex(l=>l.includes('-->'));
        if(ai<0) continue;
        const [s,e]=lines[ai].split('-->').map(p=>vtime(p.trim().split(/\s/)[0]));
        if(isNaN(s)||isNaN(e)) continue;
        const txt=lines.slice(ai+1).join('\n')
            .replace(/<\d+:\d+:\d+\.\d+>/g,'')
            .replace(/<c[.\w]*>|<\/c>/g,'')
            .replace(/<[^>]+>/g,'').trim();
        if(txt) cues.push({s,e,t:txt});
    }
    return cues.sort((a,b)=>a.s-b.s);
}
function vtime(s){
    if(!s) return NaN;
    const p=s.split(':').map(Number);
    return p.length===3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
}
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── KICK OFF ── */
initTracks();
</script>
